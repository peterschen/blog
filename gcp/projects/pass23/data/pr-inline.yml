kind: Namespace
apiVersion: v1
metadata:
  name: ${ENVIRONMENT_NAME}
  labels:
    name: ${ENVIRONMENT_NAME}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: pd-balanced
  namespace: ${ENVIRONMENT_NAME}
provisioner: pd.csi.storage.gke.io
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  type: pd-balanced
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mssql
  namespace: ${ENVIRONMENT_NAME}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: pd-balanced
---
apiVersion: v1
kind: Secret
metadata:
  name: mssql
  namespace: ${ENVIRONMENT_NAME}
type: Opaque
stringData: 
  MSSQL_SA_PASSWORD: Admin123Admin123
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database
  namespace: ${ENVIRONMENT_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      terminationGracePeriodSeconds: 30
      hostname: database
      securityContext:
        fsGroup: 10001
      containers:
        - name: database
          image: mcr.microsoft.com/mssql/server:2022-CU9-ubuntu-20.04
          resources:
            requests:
              memory: "2G"
              cpu: "2000m"
            limits:
              memory: "2G"
              cpu: "2000m"
          ports:
            - containerPort: 1433
          env:
            - name: MSSQL_PID
              value: "Developer"
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mssql
                  key: MSSQL_SA_PASSWORD
          volumeMounts:
            - name: mssql
              mountPath: /var/opt/mssql
      volumes:
        - name: mssql
          persistentVolumeClaim:
            claimName: mssql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: ${ENVIRONMENT_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      terminationGracePeriodSeconds: 30
      hostname: app
      containers:
        - name: app
          image: ${AF_REGION}-docker.pkg.dev/${PROJECT_ID}/${AF_REPOSITORY}/${IMAGE_NAME}:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DatabaseMode
              value: inline
            - name: DatabasePassword
              valueFrom:
                secretKeyRef:
                  name: mssql
                  key: MSSQL_SA_PASSWORD
      initContainers:
      - name: wait-for
        image: ghcr.io/patrickdappollonio/wait-for:latest
        command:
          - /wait-for
        args:
          - --host="database:1433"
          - --timeout=20s
          - --verbose
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: ${ENVIRONMENT_NAME}
spec:
  selector:
    app: database
  ports:
    - protocol: TCP
      port: 1433
      targetPort: 1433
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: database-lb
  namespace: ${ENVIRONMENT_NAME}
spec:
  selector:
    app: database
  ports:
    - protocol: TCP
      port: 1433
      targetPort: 1433
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: ${ENVIRONMENT_NAME}
spec:
  selector:
    app: app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
