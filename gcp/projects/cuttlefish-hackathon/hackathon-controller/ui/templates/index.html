<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Principals Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding-top: 2rem;
      background-color: #f8f9fa;
    }

    .table-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .sprite-panel {
      width: 114px;
      height: 119.5px;
      background-image: url('/images/android.svg');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      display: inline-block;
      margin: 0 auto;
    }
    
    /* Example sprite offsets - assume the image is a vertical sprite sheet */
    /* Update these positions as needed once the real image is provided */
    .stage-0 { background-position: 0 0px; height: 100.4px; }
    .stage-1 { background-position: 0 0px; height: 100.4px; } /* Assuming stage 1 is same as 0, as not specified */
    .stage-2 { background-position: 0 -105.5px; height: 100.5px; }
    .stage-3 { background-position: 0 -210.9px; height: 119.5px; }
    .stage-4 { background-position: 0 -335.4px; height: 119.5px; }
    .stage-5 { background-position: 0 -459.9px; height: 119.5px; }
    .stage-6 { background-position: 0 -584.4px; height: 119.5px; }
  </style>
</head>

<body>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="mb-0">Principals Dashboard</h2>
      <button class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#collapseStages"
        aria-expanded="false" aria-controls="collapseStages">
        View Progress Tracking
      </button>
    </div>
    
    <div class="collapse mb-4" id="collapseStages">
      <div class="card card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="mb-0">Principal Stages View</h4>
          <button type="button" class="btn-close" data-bs-toggle="collapse" data-bs-target="#collapseStages"
            aria-label="Close"></button>
        </div>
        <div id="stagesContainer" class="d-flex flex-wrap gap-3">
          <span class="text-muted">Loading stages...</span>
        </div>
      </div>
    </div>

    <div class="table-container">
      <table class="table table-hover">
        <thead class="table-dark">
          <tr>
            <th>Email</th>
            <th>Project</th>
            <th>Nickname</th>
            <th>Stages</th>
            <th>Added</th>
            <th>Modified</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="principalsTableBody">
          <tr>
            <td colspan="7" class="text-center">Loading principals...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="editForm">
          <div class="modal-header">
            <h5 class="modal-title" id="editModalLabel">Edit Nickname</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editDocId">
            <div class="mb-3">
              <label for="nicknameInput" class="form-label">Nickname</label>
              <input type="text" class="form-control" id="nicknameInput" required>
            </div>
            <div class="mb-3">
              <label for="stageInput" class="form-label">Add Stage Completed (Optional)</label>
              <input type="number" class="form-control" id="stageInput" min="1" placeholder="e.g. 1">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Save changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE = '/api/principals';
    let currentModal = null;
      let lastDataString = ""; // Store stringified data to avoid re-rendering layout
      let pollInterval = null;

    document.addEventListener("DOMContentLoaded", () => {
      currentModal = new bootstrap.Modal(document.getElementById('editModal'));
      loadPrincipals();
      pollInterval = setInterval(loadPrincipals, 5000); // Poll every 5 seconds

      document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const docId = document.getElementById('editDocId').value;
        const nickname = document.getElementById('nicknameInput').value;
        const stageStr = document.getElementById('stageInput').value;

        try {
          // Update nickname
          const nicknamePromise = fetch(`${API_BASE}/${docId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nickname })
          });
          
          let promises = [nicknamePromise];
          
          // Optionally update stage
          if (stageStr && stageStr.trim() !== '') {
            const stage = parseInt(stageStr, 10);
            const stagePromise = fetch(`${API_BASE}/${docId}/progress`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ stage })
            });
            promises.push(stagePromise);
          }

          const responses = await Promise.all(promises);
          
          const failed = responses.find(r => !r.ok);
          if (failed) {
              const error = await failed.json();
              alert("Failed to update: " + (error.error || "Unknown error"));
          } else {
             // force UI refresh
             lastDataString = "";
             currentModal.hide();
             loadPrincipals();
          }
        } catch (err) {
          alert("Error connecting to server: " + err);
        }
      });
    });

    async function loadPrincipals() {
      const tbody = document.getElementById('principalsTableBody');
      const stagesContainer = document.getElementById('stagesContainer');
      try {
        const response = await fetch(API_BASE);
        const json = await response.json();

        // Check if data actually changed to avoid flickering
        const newDataString = JSON.stringify(json.data || []);
        if (newDataString === lastDataString) {
          return; // No changes, don't update DOM
        }
        lastDataString = newDataString;

        if (json.status === "success" && json.data.length > 0) {
          tbody.innerHTML = '';
          stagesContainer.innerHTML = '';
          json.data.forEach(p => {
            const date_created = new Date(p.date_created * 1000).toLocaleString();
            const date_modified = p.date_modified ? new Date(p.date_modified * 1000).toLocaleString() : date_created;

            let grantButton = '';
            if (p.permissions_granted) {
              grantButton = `<button class="btn btn-sm btn-secondary ms-1" disabled>Granted</button>`;
            } else {
              grantButton = `<button class="btn btn-sm btn-outline-success ms-1" onclick="grantPermissions('${p.id}')">Grant Permissions</button>`;
            }

            // Render stages badges
            let stagesHtml = '';
            if (p.stages && p.stages.length > 0) {
              // deduplicate and sort numerical array
              const sortedStages = [...new Set(p.stages)].sort((a,b) => a - b);
              stagesHtml = sortedStages.map(s => `<span class="badge bg-info text-dark me-1">Stage ${s}</span>`).join('');
            } else {
              stagesHtml = `<span class="text-muted small">None</span>`;
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `
                        <td>${p.email || '-'}</td>
                        <td>${p.project || '-'}</td>
                        <td>${p.nickname || '-'}</td>
                        <td>${stagesHtml}</td>
                        <td>${date_created}</td>
                        <td>${date_modified}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="openEdit('${p.id}', '${p.nickname || ''}')">
                                Edit
                            </button>
                            ${grantButton}
                            <button class="btn btn-sm btn-outline-danger ms-1" onclick="deletePrincipal('${p.id}')">
                                Delete
                            </button>
                        </td>
                    `;
            tbody.appendChild(tr);

            // Create Stage visualization
            const highestStage = p.highest_consecutive_stage || 0;
            const stageElement = document.createElement('div');
            stageElement.className = 'card text-center p-3 shadow-sm';
            stageElement.style.width = '150px';
            stageElement.innerHTML = `
              <div class="fw-bold mb-2">${p.nickname || p.email.split('@')[0]}</div>
              <div class="sprite-panel stage-${highestStage}"></div>
            `;
            stagesContainer.appendChild(stageElement);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No principals found.</td></tr>';
          stagesContainer.innerHTML = '<span class="text-muted">No principals found.</span>';
        }
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Failed to load data.</td></tr>';
        stagesContainer.innerHTML = '<span class="text-danger">Failed to load stages data.</span>';
      }
    }

    function openEdit(docId, currentNickname) {
      document.getElementById('editDocId').value = docId;
      document.getElementById('nicknameInput').value = currentNickname;
      document.getElementById('stageInput').value = ''; // Reset stage input
      currentModal.show();
    }

    async function deletePrincipal(docId) {
      if (!confirm('Are you sure you want to delete this principal?')) {
        return;
      }
      try {
        const response = await fetch(`${API_BASE}/${docId}`, {
          method: 'DELETE'
        });

        if (response.ok) {
          loadPrincipals();
        } else {
          const error = await response.json();
          alert("Failed to delete: " + (error.error || "Unknown error"));
        }
      } catch (err) {
        alert("Error connecting to server.");
      }
    }

    async function grantPermissions(docId) {
    try {
      const response = await fetch(`${API_BASE}/${docId}/grant_permissions`, {
        method: 'POST'
      });

      if (response.ok) {
        // Reset lastDataString to force re-render since we know we just mutated state
        lastDataString = "";
        loadPrincipals();
      } else {
        const error = await response.json();
        alert("Failed to grant permissions: " + (error.error || "Unknown error"));
      }
    } catch (err) {
      alert("Error connecting to server.");
    }
  }
  </script>

</body>

</html>
